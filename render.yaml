services:
  - type: web
    name: exam-portal
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn exam_portal.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
